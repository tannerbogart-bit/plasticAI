services:
  - type: web
    name: clearscan-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clearscan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false   # set to your Vercel frontend URL

databases:
  - name: clearscan-db
    databaseName: clearscan
    plan: free
